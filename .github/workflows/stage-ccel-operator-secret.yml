name: Stage CCEL Operator Secret

on:
  workflow_dispatch:
    inputs:
      expected_main_sha:
        description: 'Exact current main commit SHA'
        required: true
        type: string
      expected_cloudflare_account_id:
        description: 'Exact 32-character Cloudflare account ID'
        required: true
        type: string
      expected_baseline_version_id:
        description: 'Exact currently deployed production Worker UUID'
        required: true
        type: string
      confirmation:
        description: 'Type I AUTHORIZE PROVISIONING THE PROTECTED CCEL OPERATOR SECRET'
        required: true
        type: string
      execute:
        description: 'False validates locally only; true requests protected staging'
        required: true
        default: false
        type: boolean

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  validate:
    name: Validate staging request without secrets
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - run: npm ci

      - name: Validate exact request and inert configurations
        env:
          DISPATCH_REF: ${{ github.ref }}
          DISPATCH_SHA: ${{ github.sha }}
          EXPECTED_SHA: ${{ inputs.expected_main_sha }}
          EXPECTED_ACCOUNT: ${{ inputs.expected_cloudflare_account_id }}
          EXPECTED_BASELINE: ${{ inputs.expected_baseline_version_id }}
          CONFIRMATION: ${{ inputs.confirmation }}
          EXECUTE: ${{ inputs.execute }}
        run: |
          git fetch --no-tags origin main:refs/remotes/origin/main
          LIVE_MAIN_SHA="$(git rev-parse refs/remotes/origin/main)"
          npx --no-install tsx scripts/ccel-operator-secret-release.ts validate-dispatch \
            --action stage --ref "$DISPATCH_REF" --sha "$DISPATCH_SHA" \
            --expected-sha "$EXPECTED_SHA" --live-main-sha "$LIVE_MAIN_SHA" \
            --expected-account "$EXPECTED_ACCOUNT" --baseline "$EXPECTED_BASELINE" \
            --confirmation "$CONFIRMATION" --execute "$EXECUTE" \
            --config wrangler.toml --release-config wrangler.release.toml

      - name: Exercise fail-closed release policy and official JSON fixtures
        run: npx --no-install vitest run test/unit/scripts/ccelOperatorSecretRelease.test.ts test/unit/config/ccelOperatorSecretProvisioning.test.ts

      - name: Dry-run the minimal Wrangler release configuration
        run: npm run validate:release-config

  stage:
    name: Create one undeployed secret-only Worker version
    needs: validate
    if: inputs.execute == true
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: production
      url: https://mcp.theologai.xyz/mcp
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - run: npm ci

      - name: Complete slow production D1 readiness before the mutation window
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npm run d1:remote:check -- --database THEOLOGAI_DB

      - name: Immediately revalidate and attempt undeployed secret staging
        id: mutate
        continue-on-error: true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          THEOLOGAI_CCEL_OPERATOR_TOKEN: ${{ secrets.THEOLOGAI_CCEL_OPERATOR_TOKEN }}
          DISPATCH_REF: ${{ github.ref }}
          DISPATCH_SHA: ${{ github.sha }}
          EXPECTED_SHA: ${{ inputs.expected_main_sha }}
          EXPECTED_ACCOUNT: ${{ inputs.expected_cloudflare_account_id }}
          EXPECTED_BASELINE: ${{ inputs.expected_baseline_version_id }}
          CONFIRMATION: ${{ inputs.confirmation }}
          WRANGLER_LOG_PATH: ${{ runner.temp }}/wrangler-logs
        run: |
          set +x
          git fetch --no-tags origin main:refs/remotes/origin/main
          LIVE_MAIN_SHA="$(git rev-parse refs/remotes/origin/main)"
          npx --no-install tsx scripts/ccel-operator-secret-release.ts validate-dispatch \
            --action stage --ref "$DISPATCH_REF" --sha "$DISPATCH_SHA" \
            --expected-sha "$EXPECTED_SHA" --live-main-sha "$LIVE_MAIN_SHA" \
            --expected-account "$EXPECTED_ACCOUNT" --baseline "$EXPECTED_BASELINE" \
            --confirmation "$CONFIRMATION" --execute true \
            --config wrangler.toml --release-config wrangler.release.toml
          npx --no-install tsx scripts/ccel-operator-secret-release.ts validate-account --expected "$EXPECTED_ACCOUNT"
          npx --no-install tsx scripts/ccel-operator-secret-release.ts validate-token
          npx --no-install wrangler versions list --config wrangler.release.toml --name theologai --json > "$RUNNER_TEMP/versions-before.json"
          npx --no-install wrangler deployments list --config wrangler.release.toml --name theologai --json > "$RUNNER_TEMP/deployments-before.json"
          npx --no-install wrangler versions view "$EXPECTED_BASELINE" --config wrangler.release.toml --name theologai --json > "$RUNNER_TEMP/baseline-version.json"
          npx --no-install tsx scripts/ccel-operator-secret-release.ts validate-stage-baseline \
            --versions "$RUNNER_TEMP/versions-before.json" --deployments "$RUNNER_TEMP/deployments-before.json" \
            --baseline-view "$RUNNER_TEMP/baseline-version.json" --expected-baseline "$EXPECTED_BASELINE"
          echo 'attempted=true' >> "$GITHUB_OUTPUT"
          set +e
          printf '%s' "$THEOLOGAI_CCEL_OPERATOR_TOKEN" | npx --no-install wrangler versions secret put THEOLOGAI_CCEL_OPERATOR_TOKEN \
            --config wrangler.release.toml --name theologai \
            --message 'Stage THEOLOGAI_CCEL_OPERATOR_TOKEN without traffic' --tag ccel-operator-secret-staged
          status=$?
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit "$status"

      - name: Always capture authoritative state and enforce staging postconditions
        id: postcondition
        if: always()
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          EXPECTED_BASELINE: ${{ inputs.expected_baseline_version_id }}
          MUTATION_ATTEMPTED: ${{ steps.mutate.outputs.attempted }}
          MUTATION_EXIT_CODE: ${{ steps.mutate.outputs.exit_code }}
          MUTATION_OUTCOME: ${{ steps.mutate.outcome }}
          WRANGLER_LOG_PATH: ${{ runner.temp }}/wrangler-logs
        run: |
          set +e
          npx --no-install wrangler versions list --config wrangler.release.toml --name theologai --json > "$RUNNER_TEMP/versions-after.json"
          versions_status=$?
          npx --no-install wrangler deployments list --config wrangler.release.toml --name theologai --json > "$RUNNER_TEMP/deployments-after.json"
          deployments_status=$?
          staged_version=''
          state_status=1
          view_status=1
          delta_status=1
          if [ "$MUTATION_ATTEMPTED" = 'true' ] && [ "$versions_status" -eq 0 ] && [ "$deployments_status" -eq 0 ]; then
            staged_version="$(npx --no-install tsx scripts/ccel-operator-secret-release.ts validate-stage-outcome \
              --before-versions "$RUNNER_TEMP/versions-before.json" --after-versions "$RUNNER_TEMP/versions-after.json" \
              --before-deployments "$RUNNER_TEMP/deployments-before.json" --after-deployments "$RUNNER_TEMP/deployments-after.json" \
              --expected-baseline "$EXPECTED_BASELINE" --mutation-outcome "$MUTATION_OUTCOME")"
            state_status=$?
            if [ "$state_status" -eq 0 ]; then
              npx --no-install wrangler versions view "$staged_version" --config wrangler.release.toml --name theologai --json > "$RUNNER_TEMP/staged-version.json"
              view_status=$?
              if [ "$view_status" -eq 0 ]; then
                npx --no-install tsx scripts/ccel-operator-secret-release.ts validate-staged \
                  --baseline-view "$RUNNER_TEMP/baseline-version.json" --staged-view "$RUNNER_TEMP/staged-version.json" \
                  --expected-baseline "$EXPECTED_BASELINE" --expected-staged "$staged_version"
                delta_status=$?
              fi
            fi
          fi
          {
            echo '### CCEL operator-secret staging reconciliation'
            printf 'Mutation attempted: `%s`\n' "${MUTATION_ATTEMPTED:-false}"
            printf 'Wrangler command outcome/exit: `%s` / `%s`\n' "$MUTATION_OUTCOME" "${MUTATION_EXIT_CODE:-not-run}"
            printf 'Authoritative query status (versions/deployments/view): `%s/%s/%s`\n' "$versions_status" "$deployments_status" "$view_status"
            printf 'State/delta validation status: `%s/%s`\n' "$state_status" "$delta_status"
            if [ -n "$staged_version" ]; then printf 'Observed staged Worker version: `%s`\n' "$staged_version"; fi
            echo 'No deployment was authorized. A dashboard/API writer outside GitHub concurrency can still invalidate the next gate.'
          } >> "$GITHUB_STEP_SUMMARY"
          if [ "$MUTATION_OUTCOME" != 'success' ] || [ "$state_status" -ne 0 ] || [ "$view_status" -ne 0 ] || [ "$delta_status" -ne 0 ]; then exit 1; fi
          echo "staged_version_id=$staged_version" >> "$GITHUB_OUTPUT"
