name: PR Checks

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, labeled, ready_for_review]

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test-and-build:
    name: Test & Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - run: npm ci

      - name: Verify generated Worker binding types
        run: |
          npm run types:worker:check
          npm run types:ccel-coordinator:check

      - name: Validate production and preview Worker configuration
        run: |
          npm run validate:worker-config
          npm run validate:ccel-coordinator-config
          npm run validate:ccel-coordinator-test-config

      - name: Typecheck Node.js target
        run: npm run typecheck:node

      - name: Typecheck Workers target
        run: |
          npm run typecheck:worker
          npm run typecheck:ccel-coordinator

      - name: Typecheck Worker runtime tests
        run: |
          npm run typecheck:worker-runtime
          npm run typecheck:ccel-coordinator-test
          npm run typecheck:test-fixtures

      - name: Run unit tests with enforced coverage thresholds
        run: npm run test:coverage

      - name: Run current-architecture integration tests
        run: npm run test:integration

      - name: Build Node.js target
        run: npm run build

  fresh-checkout-data:
    name: Fresh Checkout & Data
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - run: npm ci

      - name: Confirm derived database is absent
        run: test ! -e data/theologai.db

      - name: Verify canonical data sources
        run: npm run data:verify-sources

      - name: Verify historical section-key lineage
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          test "$(git rev-parse HEAD^1)" = "$BASE_SHA"
          if git cat-file -e "$BASE_SHA:data/historical-section-key-plan.json"; then
            git show "$BASE_SHA:data/historical-section-key-plan.json" > "$RUNNER_TEMP/historical-section-key-plan.previous.json"
            npm run data:verify-section-keys -- --previous-plan "$RUNNER_TEMP/historical-section-key-plan.previous.json"
          else
            npm run data:verify-section-keys -- --genesis
          fi

      - name: Build SQLite database from tracked sources
        run: npm run build:db -- --output "$RUNNER_TEMP/theologai.db"

      - name: Verify generated SQLite database
        run: npm run data:verify-db -- --database "$RUNNER_TEMP/theologai.db"

      - name: Exercise D1 readiness checks against generated database
        run: |
          test -f "$THEOLOGAI_TEST_DATABASE_PATH"
          npm run test:d1-readiness-generated-db
        env:
          THEOLOGAI_TEST_DATABASE_PATH: ${{ runner.temp }}/theologai.db

      - name: Export deterministic local D1 seed
        run: npm run d1:seed:export -- --database "$RUNNER_TEMP/theologai.db" --clean

      - name: Verify and reproduce deterministic local D1 seed
        run: |
          npm run d1:seed:verify
          cp scripts/d1-seed/seed-manifest.json "$RUNNER_TEMP/d1-seed-manifest.json"
          npm run d1:seed:export -- --database "$RUNNER_TEMP/theologai.db" --clean
          cmp "$RUNNER_TEMP/d1-seed-manifest.json" scripts/d1-seed/seed-manifest.json
          npm run d1:seed:verify
          npm run d1:seed:verify-import -- --database "$RUNNER_TEMP/theologai.db"

      - name: Verify historical section compatibility evidence against generated local artifacts
        run: >-
          npx --no-install tsx scripts/historical-section-compatibility-evidence.ts
          --database "$RUNNER_TEMP/theologai.db"
          --seed-directory scripts/d1-seed

      - name: Import generated seed through local D1
        run: npm run d1:seed:verify-workerd

      - name: Build Node.js target
        run: npm run build

  worker-runtime:
    name: Worker Runtime & D1
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - run: npm ci

      - name: Typecheck Worker runtime tests
        run: npm run typecheck:worker-runtime

      - name: Exercise Worker MCP endpoint with isolated D1
        run: |
          npm run test:worker-runtime
          npm run test:ccel-coordinator-runtime

      - name: Exercise production-like Worker bundle without test-only globals
        run: npm run test:worker-production-runtime

  node-http-e2e:
    name: Node HTTP E2E
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - run: npm ci

      - name: Exercise compiled Node HTTP MCP server
        run: npm run test:e2e

  mcp-conformance:
    name: Applicable MCP Conformance
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - run: npm ci

      - name: Run applicable official MCP server scenarios
        run: npm run test:conformance

      - name: Upload MCP conformance results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: mcp-conformance-results
          path: test-output/mcp-conformance/
          if-no-files-found: error

  preview-deploy:
    name: Deploy Preview
    needs: [test-and-build, fresh-checkout-data, worker-runtime, node-http-e2e, mcp-conformance]
    if: >-
      github.event.pull_request.state == 'open' &&
      github.event.pull_request.draft == false &&
      github.event.pull_request.base.ref == 'main' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      contains(github.event.pull_request.labels.*.name, 'deploy-preview')
    # This deliberately differs from the workflow-wide per-PR group above:
    # one shared preview Worker cannot safely audit two deploying PRs at once.
    concurrency:
      group: theologai-shared-preview-deploy-and-audit
      cancel-in-progress: false
    runs-on: ubuntu-latest
    environment:
      name: preview
      url: https://preview-mcp.theologai.xyz/mcp
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Confirm live preview authorization before using environment secrets
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const { data: pullRequest } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });
            const labels = pullRequest.labels.map(label => label.name);
            const failures = [];

            if (pullRequest.state !== 'open') failures.push('the pull request is no longer open');
            if (pullRequest.draft) failures.push('the pull request is now a draft');
            if (pullRequest.base.ref !== 'main') failures.push('the pull request no longer targets main');
            if (pullRequest.head.repo.full_name !== `${context.repo.owner}/${context.repo.repo}`) {
              failures.push('the pull request no longer has a same-repository head');
            }
            if (!labels.includes('deploy-preview')) failures.push('the deploy-preview label is absent');
            if (pullRequest.head.sha !== context.payload.pull_request.head.sha) {
              failures.push('the pull request head changed after this workflow started');
            }

            if (failures.length > 0) {
              core.setFailed(`Preview authorization revoked: ${failures.join('; ')}.`);
            }

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Verify preview checkout identity
        id: preview-checkout
        env:
          EXPECTED_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          checked_out_commit="$(git rev-parse HEAD)"
          checked_out_tree="$(git rev-parse HEAD^{tree})"
          if test "$checked_out_commit" != "$EXPECTED_HEAD_SHA"; then
            echo "::error::Preview checkout does not match the authorized pull-request head. Expected $EXPECTED_HEAD_SHA, got $checked_out_commit."
            exit 1
          fi
          printf 'commit=%s\n' "$checked_out_commit" >> "$GITHUB_OUTPUT"
          printf 'tree=%s\n' "$checked_out_tree" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - run: npm ci

      - name: Verify preview D1 is compatible (read-only)
        run: npm run d1:remote:check -- --database THEOLOGAI_DB --env preview
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Capture preview Worker versions before deployment (read-only)
        run: npx --no-install wrangler versions list --env preview --json > "$RUNNER_TEMP/preview-worker-versions-before.json"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          WRANGLER_LOG_PATH: ${{ runner.temp }}/wrangler-logs

      - name: Reconfirm live preview authorization immediately before deployment
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const { data: pullRequest } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });
            const labels = pullRequest.labels.map(label => label.name);
            const failures = [];

            if (pullRequest.state !== 'open') failures.push('the pull request is no longer open');
            if (pullRequest.draft) failures.push('the pull request is now a draft');
            if (pullRequest.base.ref !== 'main') failures.push('the pull request no longer targets main');
            if (pullRequest.head.repo.full_name !== `${context.repo.owner}/${context.repo.repo}`) {
              failures.push('the pull request no longer has a same-repository head');
            }
            if (!labels.includes('deploy-preview')) failures.push('the deploy-preview label is absent');
            if (pullRequest.head.sha !== context.payload.pull_request.head.sha) {
              failures.push('the pull request head changed after this workflow started');
            }

            if (failures.length > 0) {
              core.setFailed(`Preview authorization revoked: ${failures.join('; ')}.`);
            }

      - name: Deploy to Cloudflare Workers (preview)
        id: preview-worker-deploy
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
        with:
          wranglerVersion: '4.107.0'
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          environment: preview
          secrets: |
            ESV_API_KEY
          command: deploy --env preview
        env:
          ESV_API_KEY: ${{ secrets.ESV_API_KEY }}

      - name: Verify exact active preview Worker version (read-only)
        id: preview-worker-pre-audit-identity
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          DEPLOY_COMMAND_OUTPUT: ${{ steps.preview-worker-deploy.outputs.command-output }}
          WRANGLER_LOG_PATH: ${{ runner.temp }}/wrangler-logs
        run: |
          printf '%s' "$DEPLOY_COMMAND_OUTPUT" > "$RUNNER_TEMP/preview-worker-deploy.command-output.txt"
          npx --no-install wrangler versions list --env preview --json > "$RUNNER_TEMP/preview-worker-versions-after.json"
          npx --no-install wrangler deployments list --env preview --json > "$RUNNER_TEMP/preview-worker-deployments-after.json"
          npx --no-install tsx scripts/verify-preview-worker-deployment.ts verify-deploy \
            --before-versions "$RUNNER_TEMP/preview-worker-versions-before.json" \
            --after-versions "$RUNNER_TEMP/preview-worker-versions-after.json" \
            --after-deployments "$RUNNER_TEMP/preview-worker-deployments-after.json" \
            --command-output "$RUNNER_TEMP/preview-worker-deploy.command-output.txt" \
            --output "$RUNNER_TEMP/preview-worker-deployment-pre-audit-identity.json" \
            --github-output "$GITHUB_OUTPUT"

      # This is deliberately a post-deploy release gate, not an ordinary PR
      # check: the runner is pinned to the canonical preview custom domain.
      - name: Audit original-language v2 contract on preview
        run: |
          npm run audit:original-language-v2-preview -- \
            --output "$RUNNER_TEMP/original-language-v2-preview-audit.json"
          test -s "$RUNNER_TEMP/original-language-v2-preview-audit.json"

      - name: Verify preview Worker remained active through audit (read-only)
        id: preview-worker-audit-identity
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          WRANGLER_LOG_PATH: ${{ runner.temp }}/wrangler-logs
        run: |
          npx --no-install wrangler deployments list --env preview --json > "$RUNNER_TEMP/preview-worker-deployments-post-audit.json"
          npx --no-install tsx scripts/verify-preview-worker-deployment.ts verify-audit-stability \
            --pre-audit-identity "$RUNNER_TEMP/preview-worker-deployment-pre-audit-identity.json" \
            --post-audit-deployments "$RUNNER_TEMP/preview-worker-deployments-post-audit.json" \
            --output "$RUNNER_TEMP/preview-worker-deployment-identity.json" \
            --github-output "$GITHUB_OUTPUT"

      - name: Hash sanitized preview audit evidence
        id: preview-audit-evidence
        run: |
          audit_sha256="$(sha256sum "$RUNNER_TEMP/original-language-v2-preview-audit.json" | awk '{print $1}')"
          identity_sha256="$(sha256sum "$RUNNER_TEMP/preview-worker-deployment-identity.json" | awk '{print $1}')"
          printf 'audit_sha256=%s\n' "$audit_sha256" >> "$GITHUB_OUTPUT"
          printf 'identity_record_sha256=%s\n' "$identity_sha256" >> "$GITHUB_OUTPUT"

      - name: Upload protected preview audit evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: original-language-v2-preview-audit-${{ github.event.pull_request.number }}-${{ github.event.pull_request.head.sha }}
          path: |
            ${{ runner.temp }}/original-language-v2-preview-audit.json
            ${{ runner.temp }}/preview-worker-deployment-identity.json
          retention-days: 7
          if-no-files-found: error

      - name: Comment preview URL on PR
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          CHECKED_OUT_COMMIT: ${{ steps.preview-checkout.outputs.commit }}
          CHECKED_OUT_TREE: ${{ steps.preview-checkout.outputs.tree }}
          WORKER_VERSION_ID: ${{ steps.preview-worker-audit-identity.outputs.version_id }}
          WORKER_DEPLOYMENT_ID: ${{ steps.preview-worker-audit-identity.outputs.deployment_id }}
          WORKER_IDENTITY_SHA256: ${{ steps.preview-audit-evidence.outputs.identity_record_sha256 }}
          AUDIT_SHA256: ${{ steps.preview-audit-evidence.outputs.audit_sha256 }}
          AUDIT_ARTIFACT: original-language-v2-preview-audit-${{ github.event.pull_request.number }}-${{ github.event.pull_request.head.sha }}
        with:
          script: |
            const commit = process.env.CHECKED_OUT_COMMIT;
            const tree = process.env.CHECKED_OUT_TREE;
            const workerVersion = process.env.WORKER_VERSION_ID;
            const deployment = process.env.WORKER_DEPLOYMENT_ID;
            const workerIdentity = process.env.WORKER_IDENTITY_SHA256;
            const audit = process.env.AUDIT_SHA256;
            const artifact = process.env.AUDIT_ARTIFACT;
            if (!/^[0-9a-f]{40}$/i.test(commit) || !/^[0-9a-f]{40}$/i.test(tree)
              || !/^[0-9a-f]{8}-[0-9a-f]{4}-[1-5][0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$/i.test(workerVersion)
              || !/^[0-9a-f]{8}-[0-9a-f]{4}-[1-5][0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$/i.test(deployment)
              || !/^[0-9a-f]{64}$/i.test(workerIdentity) || !/^[0-9a-f]{64}$/i.test(audit)
              || !/^original-language-v2-preview-audit-\d+-[0-9a-f]{40}$/i.test(artifact)) {
              core.setFailed('Preview release evidence is missing or malformed.');
              return;
            }
            const body = [
              '### Preview Deployed',
              '',
              '**Canonical URL:** https://preview-mcp.theologai.xyz',
              '**Canonical MCP Endpoint:** `https://preview-mcp.theologai.xyz/mcp`',
              '**Compatibility alias:** https://theologai-preview.tjfrederick.workers.dev',
              '**Compatibility MCP endpoint:** `https://theologai-preview.tjfrederick.workers.dev/mcp`',
              '',
              `Deployed from checked-out commit \`${commit}\` (tree \`${tree}\`).`,
              `Cloudflare confirms Worker version \`${workerVersion}\` at 100% in deployment \`${deployment}\`.`,
              `Sanitized audit evidence SHA-256: \`${audit}\`; identity record SHA-256: \`${workerIdentity}\`; retained artifact: \`${artifact}\` (7 days).`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Preview Deployed')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
