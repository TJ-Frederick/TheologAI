name: Biblical Language Source Reproduction

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/language-source-reproduction.yml'
      - 'data/biblical-languages/**'
      - 'data/data-manifest.json'
      - 'scripts/biblical-language-sources.ts'
      - 'scripts/biblical-language-semantic-drift.ts'
      - 'scripts/biblical-language-unicode-correction.ts'
      - 'scripts/artifact-content-identity.ts'
      - 'scripts/d1-corpus-identity.ts'
      - 'scripts/download-pinned-source.ts'
      - 'scripts/atomic-publication.ts'
      - 'scripts/build-strongs-json.ts'
      - 'scripts/build-stepbible-json.ts'
      - 'scripts/build-stepbible-lexicons.ts'
      - 'scripts/reproduce-biblical-language-sources.ts'
      - 'scripts/write-biblical-language-source-lock.ts'
      - 'scripts/finalize-biblical-language-unicode-manifest.ts'
      - 'scripts/verify-biblical-language-unicode-d1.ts'
      - 'scripts/verify-biblical-language-sources.ts'
      - 'scripts/verify-biblical-language-reproduction-report.ts'
      - 'scripts/verify-data-manifest.ts'
      - 'test/unit/scripts/biblicalLanguageSources.test.ts'
      - 'test/unit/scripts/languageBuildInfrastructure.test.ts'
      - 'package-lock.json'
      - 'package.json'
  schedule:
    - cron: '17 9 1 * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: biblical-language-reproduction-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  reproduce:
    name: Verify Pins & Zero Reproduction Drift
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - run: npm ci

      - name: Verify immutable source lock and canonical inventory offline
        run: npm run data:verify-sources

      - name: Rebuild pinned sources without modifying tracked artifacts
        run: npm run data:reproduce-language-sources

      - name: Require zero source, semantic, artifact, and reverse-projection drift
        run: npm run data:verify-language-reproduction-report

      - name: Require deterministic source-lock and manifest finalization
        run: |
          npm run data:write-language-source-lock
          npm run data:finalize-language-unicode-manifest
          git diff --exit-code -- data/biblical-languages/SOURCE.json data/data-manifest.json

      - name: Upload reproduction evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: biblical-language-reproduction
          path: test-output/biblical-language-reproduction.json
          if-no-files-found: error
