name: Deploy Production

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Test, Build & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: production
      url: https://mcp.theologai.xyz/mcp
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - run: npm ci

      - name: Detect production custom-domain declaration change
        id: production-custom-domain-change
        run: |
          before="${{ github.event.before }}"
          if ! git cat-file -e "${before}^{commit}"; then
            git fetch --no-tags --depth=1 origin "$before"
          fi
          git show "${before}:wrangler.toml" > "$RUNNER_TEMP/wrangler-before.toml"
          npx --no-install tsx scripts/detect-production-custom-domain-change.ts \
            --before "$RUNNER_TEMP/wrangler-before.toml" \
            --after wrangler.toml \
            --github-output "$GITHUB_OUTPUT"

      - name: Verify generated Worker binding types
        run: |
          npm run types:worker:check
          npm run types:ccel-coordinator:check

      - name: Validate production and preview Worker configuration
        run: |
          npm run validate:worker-config
          npm run validate:ccel-coordinator-config
          npm run validate:ccel-coordinator-test-config

      - name: Typecheck Node.js target
        run: npm run typecheck:node

      - name: Typecheck Workers target
        run: |
          npm run typecheck:worker
          npm run typecheck:ccel-coordinator

      - name: Typecheck Worker runtime tests
        run: |
          npm run typecheck:worker-runtime
          npm run typecheck:ccel-coordinator-test
          npm run typecheck:test-fixtures

      - name: Verify canonical data sources
        run: npm run data:verify-sources

      - name: Confirm derived database is absent
        run: test ! -e data/theologai.db

      - name: Build SQLite database from tracked sources
        run: npm run build:db -- --output "$RUNNER_TEMP/theologai.db"

      - name: Verify generated SQLite database
        run: npm run data:verify-db -- --database "$RUNNER_TEMP/theologai.db"

      - name: Export deterministic local D1 seed
        run: npm run d1:seed:export -- --database "$RUNNER_TEMP/theologai.db" --clean

      - name: Verify and reproduce deterministic local D1 seed
        run: |
          npm run d1:seed:verify
          cp scripts/d1-seed/seed-manifest.json "$RUNNER_TEMP/d1-seed-manifest.json"
          npm run d1:seed:export -- --database "$RUNNER_TEMP/theologai.db" --clean
          cmp "$RUNNER_TEMP/d1-seed-manifest.json" scripts/d1-seed/seed-manifest.json
          npm run d1:seed:verify
          npm run d1:seed:verify-import -- --database "$RUNNER_TEMP/theologai.db"

      - name: Import generated seed through local D1
        run: npm run d1:seed:verify-workerd

      - name: Run unit tests with enforced coverage thresholds
        run: npm run test:coverage

      - name: Run current-architecture integration tests
        run: npm run test:integration

      - name: Exercise Worker MCP endpoint with isolated D1
        run: |
          npm run test:worker-runtime
          npm run test:ccel-coordinator-runtime

      - name: Exercise production-like Worker bundle without test-only globals
        run: npm run test:worker-production-runtime

      - name: Build Node.js target
        run: npm run build

      - name: Exercise compiled Node HTTP MCP server
        run: npm run test:e2e:compiled

      - name: Run applicable official MCP server scenarios
        run: npm run test:conformance

      - name: Audit production dependencies
        run: npm audit --omit=dev

      - name: Verify production D1 is compatible (read-only)
        run: npm run d1:remote:check -- --database THEOLOGAI_DB
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Require live website and audited preview custom domain
        if: steps.production-custom-domain-change.outputs.required == 'true'
        run: |
          IFS=$'\t' read -r website_status website_effective_url <<< "$(curl --fail --silent --show-error --location --max-time 30 \
            --output "$RUNNER_TEMP/theologai-website.html" \
            --write-out $'%{http_code}\t%{url_effective}' \
            https://theologai.xyz/)"
          test "$website_status" = "200"
          test "$website_effective_url" = "https://theologai.xyz/"
          test -s "$RUNNER_TEMP/theologai-website.html"

          options_status="$(curl --fail --silent --show-error --max-time 30 \
            --request OPTIONS \
            --header 'Origin: https://theologai.xyz' \
            --header 'Access-Control-Request-Method: POST' \
            --dump-header "$RUNNER_TEMP/preview-mcp-options.headers" \
            --output "$RUNNER_TEMP/preview-mcp-options.body" \
            --write-out '%{http_code}' \
            https://preview-mcp.theologai.xyz/mcp)"
          test "$options_status" = "204"
          grep -Eiq '^access-control-allow-origin:[[:space:]]*https://theologai\.xyz[[:space:]]*$' \
            "$RUNNER_TEMP/preview-mcp-options.headers"
          grep -Eiq '^access-control-allow-methods:[[:space:]]*.*POST.*OPTIONS.*[[:space:]]*$' \
            "$RUNNER_TEMP/preview-mcp-options.headers"

          npm run audit:parallel-preview -- \
            --url https://preview-mcp.theologai.xyz/mcp \
            --output "$RUNNER_TEMP/pre-production-preview-mcp-audit.json"
          test -s "$RUNNER_TEMP/pre-production-preview-mcp-audit.json"

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
        with:
          wranglerVersion: '4.107.0'
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          preCommands: |
            printf '%s' "$ESV_API_KEY" | npx --no-install wrangler secret put ESV_API_KEY --env=
          command: deploy --env=
        env:
          ESV_API_KEY: ${{ secrets.ESV_API_KEY }}
