name: Bootstrap CCEL Coordinator

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: 'Type BOOTSTRAP THEOLOGAI CCEL COORDINATOR'
        required: true
        type: string

concurrency:
  group: bootstrap-ccel-coordinator
  cancel-in-progress: false

jobs:
  validate:
    name: Validate initial bootstrap
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Require exact main-branch dispatch and confirmation
        env:
          DISPATCH_REF: ${{ github.ref }}
          CONFIRMATION: ${{ inputs.confirmation }}
        run: |
          set -euo pipefail
          if [ "$DISPATCH_REF" != 'refs/heads/main' ]; then
            echo "::error::Initial bootstrap must be dispatched from refs/heads/main."
            exit 1
          fi
          if [ "$CONFIRMATION" != 'BOOTSTRAP THEOLOGAI CCEL COORDINATOR' ]; then
            echo "::error::Initial bootstrap confirmation did not match exactly."
            exit 1
          fi

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - run: npm ci

      - name: Verify dedicated binding types
        run: npm run types:ccel-coordinator:check

      - name: Typecheck dedicated coordinator target
        run: npm run typecheck:ccel-coordinator

      - name: Validate dedicated coordinator bundle
        run: npm run validate:ccel-coordinator-config

      - name: Exercise coordinator policy and isolated Durable Object
        run: |
          npx vitest run test/unit/services/historical/CcelUpstreamCoordinator.test.ts
          npm run test:ccel-coordinator-runtime

  deploy:
    name: Create non-public coordinator owner
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: production
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}

      - name: Refuse to reconcile an existing owner Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          response_file="$RUNNER_TEMP/theologai-ccel-coordinator-preflight.json"
          status="$(curl --silent --show-error \
            --output "$response_file" \
            --write-out '%{http_code}' \
            --header "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/workers/scripts/theologai-ccel-coordinator")"
          case "$status" in
            404)
              rm -f "$response_file"
              ;;
            200)
              echo "::error::Owner Worker already exists; initial bootstrap refuses to overwrite or reconcile it."
              exit 1
              ;;
            *)
              echo "::error::Owner absence preflight returned unexpected HTTP status $status."
              exit 1
              ;;
          esac

      - name: Create non-public coordinator owner and SQLite namespace
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
        with:
          wranglerVersion: '4.107.0'
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --config wrangler.ccel-coordinator.toml
