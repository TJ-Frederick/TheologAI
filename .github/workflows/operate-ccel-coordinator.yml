name: Operate CCEL Coordinator

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Read snapshot or reset an exact latched state'
        required: true
        type: choice
        options: [snapshot, reset]
      worker_version_id:
        description: 'Exact production Worker version UUID'
        required: true
        type: string
      expected_state:
        description: 'For reset only: latched_policy or latched_interface'
        required: false
        type: string
      expected_operator_epoch:
        description: 'For reset only: exact snapshot operatorEpoch'
        required: false
        type: string
      confirmation:
        description: 'Type OPERATE THEOLOGAI CCEL COORDINATOR'
        required: true
        type: string

concurrency:
  group: operate-ccel-coordinator
  cancel-in-progress: false

jobs:
  operate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: production
    permissions:
      contents: read
    steps:
      - name: Require exact protected main workflow
        env:
          DISPATCH_REF: ${{ github.ref }}
          CONFIRMATION: ${{ inputs.confirmation }}
        run: |
          set -euo pipefail
          test "$DISPATCH_REF" = 'refs/heads/main'
          test "$CONFIRMATION" = 'OPERATE THEOLOGAI CCEL COORDINATOR'

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - run: npm ci

      - name: Read or conditionally reset the shared coordinator
        env:
          THEOLOGAI_CCEL_OPERATOR_TOKEN: ${{ secrets.THEOLOGAI_CCEL_OPERATOR_TOKEN }}
          ACTION: ${{ inputs.action }}
          WORKER_VERSION_ID: ${{ inputs.worker_version_id }}
          EXPECTED_STATE: ${{ inputs.expected_state }}
          EXPECTED_OPERATOR_EPOCH: ${{ inputs.expected_operator_epoch }}
        run: |
          set -euo pipefail
          args=(
            --endpoint 'https://mcp.theologai.xyz/internal/ccel-coordinator'
            --action "$ACTION"
            --worker-version-id "$WORKER_VERSION_ID"
          )
          if [ "$ACTION" = 'reset' ]; then
            args+=(--expected-state "$EXPECTED_STATE" --expected-operator-epoch "$EXPECTED_OPERATOR_EPOCH")
          fi
          npx tsx scripts/ccel-coordinator-operator.ts "${args[@]}"
